<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario completo HTML</title>
</head>

<body>

<h1>Formulario con todos los tipos de inputs</h1>

<form action="#" method="post">

    <!-- TEXT -->
    <label>Texto:</label>
    <input type="text" name="texto">
    <br><br>

    <!-- PASSWORD -->
    <label>Contraseña:</label>
    <input type="password" name="clave">
    <br><br>

    <!-- EMAIL -->
    <label>Email:</label>
    <input type="email" name="email">
    <br><br>

    <!-- NUMBER -->
    <label>Número:</label>
    <input type="number" name="numero">
    <br><br>

    <!-- TEL -->
    <label>Teléfono:</label>
    <input type="tel" name="telefono">
    <br><br>

    <!-- URL -->
    <label>URL:</label>
    <input type="url" name="web">
    <br><br>

    <!-- SEARCH -->
    <label>Búsqueda:</label>
    <input type="search" name="buscar">
    <br><br>

    <!-- DATE -->
    <label>Fecha:</label>
    <input type="date" name="fecha">
    <br><br>

    <!-- TIME -->
    <label>Hora:</label>
    <input type="time" name="hora">
    <br><br>

    <!-- DATETIME-LOCAL -->
    <label>Fecha y hora:</label>
    <input type="datetime-local" name="fechahora">
    <br><br>

    <!-- MONTH -->
    <label>Mes:</label>
    <input type="month" name="mes">
    <br><br>

    <!-- WEEK -->
    <label>Semana:</label>
    <input type="week" name="semana">
    <br><br>

    <!-- COLOR -->
    <label>Color:</label>
    <input type="color" name="color">
    <br><br>

    <!-- RANGE -->
    <label>Rango:</label>
    <input type="range" name="rango" min="0" max="100">
    <br><br>

    <!-- CHECKBOX -->
    <label>Aficiones:</label>
    <input type="checkbox" name="deporte"> Deportes
    <input type="checkbox" name="musica"> Música
    <br><br>

    <!-- RADIO -->
    <label>Sexo:</label>
    <input type="radio" name="sexo" value="hombre"> Hombre
    <input type="radio" name="sexo" value="mujer"> Mujer
    <br><br>

    <!-- FILE -->
    <label>Archivo:</label>
    <input type="file" name="archivo">
    <br><br>

    <!-- HIDDEN -->
    <input type="hidden" name="id_usuario" value="123">

    <!-- IMAGE -->
    <label>Botón imagen:</label>
    <input type="image"
           src="https://placehold.co/100x40"
           alt="Enviar">
    <br><br>

    <!-- RESET -->
    <input type="reset" value="Limpiar">
    <br><br>

    <!-- SUBMIT -->
    <input type="submit" value="Enviar">
    <br><br>

    <!-- BUTTON -->
    <input type="button" value="Botón normal">
    <br><br>

</form>

</body>
</html>
